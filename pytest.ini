[pytest]
# Pytest Configuration File
# Pytest 設定檔

# Test Discovery / 測試發現
# 告訴 pytest 在哪裡找測試檔案
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output Options / 輸出選項
# 顯示詳細的測試輸出，包括 print 語句
# Verbose output / 詳細輸出
# Short traceback format / 簡短錯誤追蹤格式
# Strict marker validation / 嚴格標記驗證
# HTML report output / HTML報告輸出
# Self-contained HTML report / 自包含HTML報告
# Show extra test summary info / 顯示額外測試摘要資訊
addopts = -v --tb=short --strict-markers --html=reports/report.html --self-contained-html -ra

# Markers / 標記
# 定義測試標記，用於分類和篩選測試
markers =
    smoke: Smoke tests - critical path validation
    regression: Regression tests - existing functionality
    negative: Negative tests - error handling
    priority1: Priority 1 - Critical paths (must pass)
    priority2: Priority 2 - Important flows (should pass)
    priority3: Priority 3 - Edge cases (nice to have)
    login: Login related tests
    cart: Shopping cart tests
    checkout: Checkout process tests

# Logging / 日誌設定
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Log File / 日誌檔案
# 將日誌同時輸出到檔案
log_file = reports/logs/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Warnings / 警告設定
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
